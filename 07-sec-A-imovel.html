<!-- A — IMÓVEL (readonly para cliente) -->
<div class="divider"></div>
<div class="readonly-section" style="position:relative">
  <div class="readonly-overlay"></div>
  <div class="sec-title" data-i18n="a_title">Identificação do Imóvel</div>
  <div class="sec-sub" data-i18n="a_sub">Informação básica do imóvel objeto da proposta.</div>
  <div class="card">
    <div class="clbl" data-i18n="a_clbl">Dados do imóvel</div>
    <div class="g2">
      <div class="f s2"><label class="req" data-i18n="a_address">Morada completa</label><input type="text" name="a_morada" data-req-pt="Morada do imóvel" data-req-en="Property address" placeholder="Rua, número, andar, código postal, cidade"><span class="f-err">Campo obrigatório</span></div>
      <div class="f"><label class="req" data-i18n="a_cp">Código Postal</label><input type="text" name="a_cp" data-req-pt="Código Postal" data-req-en="Postcode" placeholder="0000-000"><span class="f-err">Campo obrigatório</span></div>
      <div class="f"><label class="req" data-i18n="a_city">Localidade</label><input type="text" name="a_local" data-req-pt="Localidade" data-req-en="City"><span class="f-err">Campo obrigatório</span></div>
      <div class="f"><label class="req" data-i18n="a_owner">Proprietário</label><input type="text" name="a_prop" data-req-pt="Proprietário do imóvel" data-req-en="Property owner"><span class="f-err">Campo obrigatório</span></div>
      <div class="f"><label class="req" data-i18n="a_nipc">NIPC</label><input type="text" name="a_nipc" data-req-pt="NIPC do imóvel" data-req-en="Property NIPC"><span class="f-err">Campo obrigatório</span></div>
    </div>
  </div>
</div>
